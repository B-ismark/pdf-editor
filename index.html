<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#6750a4" />
    <title>PDF Text Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Resolve the saved theme preference before first paint (no flash).
      (function () {
        try {
          var m = localStorage.getItem("theme") || "system";
          var dark =
            m === "dark" ||
            (m === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light",
          );
        } catch (e) {
          /* localStorage blocked — fall back to light. */
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
