name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Bundle on-device OCR assets from the app's own origin (no runtime CDN).
      # Non-fatal: if the language-model host is unreachable, the app still
      # builds and OCR simply reports it isn't set up.
      - run: npm run setup-ocr
        continue-on-error: true
      - run: npm run build
      - uses: actions/configure-pages@v5
        # Enable Pages (Actions source) on first run so no manual Settings
        # toggle is needed.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
